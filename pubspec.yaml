name: ostazna_platform
description: منصة أستاذنا - المنصة التعليمية الذكية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & State Management
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # Animations
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  flutter_slidable: ^3.1.0
  modal_bottom_sheet: ^3.0.0
  persistent_bottom_nav_bar: ^6.2.1

  # Utils
  url_launcher: ^6.3.0
  intl: ^0.19.0
  flutter_native_splash: ^2.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
